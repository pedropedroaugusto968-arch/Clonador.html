<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREHEX OMNI-EXTRACTOR v5</title>
    <style>
        body { background: #000; color: #a020f0; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: #111; border: 2px solid #a020f0; padding: 25px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 0 30px rgba(160, 32, 240, 0.3); }
        h1 { font-size: 20px; text-align: center; color: #fff; text-shadow: 0 0 10px #a020f0; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: #0f0; border-radius: 5px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #a020f0; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; text-transform: uppercase; }
        button:hover { background: #fff; color: #a020f0; box-shadow: 0 0 20px #fff; }
        .btn-copy { background: #00ff88; color: #000; display: none; margin-top: 10px; }
        textarea { width: 100%; height: 300px; margin-top: 20px; background: #050505; color: #0f0; border: 1px solid #a020f0; padding: 10px; font-size: 11px; display: none; border-radius: 5px; }
        #log { margin-top: 10px; font-size: 12px; color: #fff; text-align: center; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="panel">
    <h1>ꜰɪʀᴇʜᴇx ᴇxᴛʀᴀᴄᴛᴏʀ ᴠɪᴘ</h1>
    <input type="text" id="url" placeholder="Link do site alvo">
    <input type="text" id="find" placeholder="Texto para remover">
    <input type="text" id="replace" placeholder="Texto para colocar">
    
    <button onclick="extrair()">EXECUTAR EXTRAÇÃO TOTAL</button>
    <button id="btnCopiar" class="btn-copy" onclick="copiar()">📋 COPIAR SCRIPT GERADO</button>
    
    <div id="log">Aguardando comando...</div>
    <textarea id="output" readonly></textarea>
</div>

<script>
    async function extrair() {
        let target = document.getElementById('url').value;
        const findText = document.getElementById('find').value;
        const replaceText = document.getElementById('replace').value;
        const log = document.getElementById('log');
        const output = document.getElementById('output');
        const btnC = document.getElementById('btnCopiar');

        if(!target) return alert("Insira o link!");
        if(!target.startsWith('http')) target = 'https://' + target;

        // Limpa resultados anteriores para ter certeza que mudou
        output.value = "";
        output.style.display = "none";
        btnC.style.display = "none";
        log.innerHTML = "🌀 [FIREHEX] Tentando conexão forçada...";
        
        try {
            // Usando um Proxy alternativo para garantir que o robô "entre" no site
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}&timestamp=${new Date().getTime()}`);
            const data = await res.json();
            let rawHtml = data.contents;

            if(!rawHtml) {
                log.innerHTML = "❌ Bloqueio detectado. Tentando via Proxy 2...";
                return;
            }

            const urlObj = new URL(target);
            const base = urlObj.origin;

            // Injeta a base para carregar estilos e scripts originais
            let finalCode = rawHtml.replace('<head>', `<head><base href="${base}/">`);

            // Executa a modificação de texto
            if(findText && replaceText) {
                finalCode = finalCode.split(findText).join(replaceText);
            }

            // Exibe o resultado
            output.value = finalCode;
            output.style.display = "block";
            btnC.style.display = "block";
            log.innerHTML = "✅ SUCESSO! Script extraído do domínio: " + urlObj.hostname;

        } catch (e) {
            log.innerHTML = "❌ Erro fatal na extração. Site offline ou protegido.";
        }
    }

    function copiar() {
        const area = document.getElementById('output');
        area.select();
        area.setSelectionRange(0, 99999);
        document.execCommand("copy");
        alert("✅ Script copiado para o seu celular!");
    }
</script>

</body>
</html>
