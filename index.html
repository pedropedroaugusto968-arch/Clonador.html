<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREHEX CLONER VIP</title>
    <style>
        body { background-color: #0d0d0d; color: #a020f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #a020f0; box-shadow: 0 0 20px #a020f0; width: 90%; max-width: 500px; text-align: center; }
        h1 { text-shadow: 2px 2px #000; font-size: 24px; margin-bottom: 20px; color: #fff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #a020f0; background: #000; color: #00ff00; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #a020f0; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; font-size: 16px; }
        button:hover { background: #7b1fa2; box-shadow: 0 0 15px #fff; }
        #status { margin-top: 20px; font-size: 14px; word-break: break-all; color: #00ff00; font-weight: bold; }
        .loading { color: yellow; font-style: italic; }
        a { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>ꜰɪʀᴇʜᴇx ᴄʟᴏɴᴇʀ ᴠ3</h1>
    
    <input type="text" id="urlAlvo" placeholder="https://site-alvo.com">
    <input type="text" id="termoAntigo" placeholder="Texto original (ex: R$ 100)">
    <input type="text" id="termoNovo" placeholder="Novo texto (ex: R$ 0,00)">
    
    <button onclick="iniciarClonagem()">INVASÃO E CLONAGEM</button>

    <div id="status"></div>
</div>

<script>
    // --- CONFIGURAÇÃO AUTOMÁTICA FIREHEX ---
    const GITHUB_TOKEN = "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"; 
    const GITHUB_USER = "pedroaugusto968-arch"; 

    async function iniciarClonagem() {
        const url = document.getElementById('urlAlvo').value;
        const antigo = document.getElementById('termoAntigo').value;
        const novo = document.getElementById('termoNovo').value;
        const status = document.getElementById('status');

        if(!url || !antigo || !novo) {
            alert("Preencha todos os campos corretamente!");
            return;
        }

        status.innerHTML = "<span class='loading'>🌀 Quebrando segurança e clonando scripts...</span>";

        try {
            // 1. Captura o HTML do site via Proxy
            const proxy = "https://api.allorigins.win/get?url=";
            const res = await fetch(proxy + encodeURIComponent(url));
            const data = await res.json();
            let htmlOriginal = data.contents;

            // 2. Modifica o conteúdo (A "Invasão")
            status.innerHTML = "<span class='loading'>🛠️ Modificando valores e injetando FireHex...</span>";
            let htmlModificado = htmlOriginal.split(antigo).join(novo);

            // 3. Gera o Repositório Único no GitHub
            const repoName = "firehex-clone-" + Math.floor(Math.random() * 99999);
            
            // Criar o Repo
            const createRepo = await fetch(`https://api.github.com/user/repos`, {
                method: 'POST',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: repoName, auto_init: true })
            });

            if (!createRepo.ok) throw new Error("Erro ao criar repositório. O Token pode ter expirado.");

            // Subir o arquivo index.html
            await fetch(`https://api.github.com/repos/${GITHUB_USER}/${repoName}/contents/index.html`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Site clonado via FireHex VIP",
                    content: btoa(unescape(encodeURIComponent(htmlModificado)))
                })
            });

            // Resultado Final
            status.innerHTML = `✅ SUCESSO!<br>O site foi clonado e o link já está sendo gerado.<br><br>LINK: <br><a href="https://${GITHUB_USER}.github.io/${repoName}/" target="_blank">https://${GITHUB_USER}.github.io/${repoName}/</a>`;

        } catch (e) {
            status.innerHTML = "❌ ERRO: " + e.message + "<br>Verifique se o seu Token no GitHub ainda é válido.";
        }
    }
</script>

</body>
</html>
