<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREHEX UNIVERSAL CLONER v9</title>
    <style>
        body { background: #000; color: #a020f0; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: #111; border: 2px solid #a020f0; padding: 25px; border-radius: 15px; width: 100%; max-width: 650px; box-shadow: 0 0 30px rgba(160, 32, 240, 0.4); text-align: center; }
        h1 { color: #fff; margin-bottom: 20px; text-shadow: 0 0 10px #a020f0; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: #0f0; border-radius: 5px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #a020f0; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; color: #a020f0; box-shadow: 0 0 20px #fff; }
        .btn-copy { background: #00ff88 !important; color: #000 !important; display: none; margin-top: 15px; }
        textarea { width: 100%; height: 350px; margin-top: 20px; background: #050505; color: #0f0; border: 1px solid #a020f0; padding: 10px; font-size: 11px; display: none; border-radius: 5px; }
        #status { margin-top: 15px; font-size: 13px; color: #fff; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="panel">
    <h1>ꜰɪʀᴇʜᴇx ᴜɴɪᴠᴇʀsᴀʟ ᴄʟᴏɴᴇʀ</h1>
    
    <input type="text" id="targetUrl" placeholder="Link do site alvo (ex: https://site.app)">
    <input type="text" id="findText" placeholder="Texto para remover (opcional)">
    <input type="text" id="replaceText" placeholder="Texto para colocar (opcional)">
    
    <button onclick="clonarSite()">EXTRAIR SCRIPT COMPLETO</button>
    <button id="btnCopiar" class="btn-copy" onclick="copiarCodigo()">📋 COPIAR SCRIPT CLONADO</button>
    
    <div id="status">Aguardando comando do sistema...</div>
    <textarea id="resultCode" readonly></textarea>
</div>

<script>
    async function clonarSite() {
        let url = document.getElementById('targetUrl').value.trim();
        const find = document.getElementById('findText').value;
        const replace = document.getElementById('replaceText').value;
        const status = document.getElementById('status');
        const area = document.getElementById('resultCode');
        const btn = document.getElementById('btnCopiar');

        if (!url) return alert("Por favor, insira o link!");
        if (!url.startsWith('http')) url = 'https://' + url;

        status.innerHTML = "🌀 [FIREHEX] Rompendo firewalls e clonando...";
        area.style.display = "none";
        btn.style.display = "none";

        try {
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_=${Date.now()}`);
            const data = await response.json();
            let html = data.contents;

            if (!html) throw new Error("Acesso negado.");

            const urlBase = new URL(url).origin;

            // 1. Injeta a base para carregar arquivos originais do site alvo
            let htmlClonado = html.replace('<head>', `<head><base href="${urlBase}/">`);
            
            // 2. Corrige links relativos (essencial para evitar tela preta)
            htmlClonado = htmlClonado.replace(/(src|href|content)="\/(?!\/)/g, `$1="${urlBase}/`);

            // 3. REMOVE ERROS DE WEBHOOK DO SITE ORIGINAL
            htmlClonado = htmlClonado.replace(/WEBHOOK NÃO CONFIGURADA/g, "SISTEMA ATIVADO [FIREHEX]");
            htmlClonado = htmlClonado.replace(/Configure DISCORD_WEBHOOK_URL/g, "Bypass FireHex Ativado");

            // 4. Injeta Script de Limpeza Automática para evitar alertas chatos
            let bypassScript = \`
            <script>
                window.onload = function() {
                    const el = document.body.innerText;
                    if(el.includes('WEBHOOK')) {
                        document.body.innerHTML = document.body.innerHTML.replace(/WEBHOOK/g, 'SISTEMA');
                    }
                };
            <\/script>\`;
            htmlClonado = htmlClonado.replace('</body>', bypassScript + '</body>');

            // 5. Troca de texto personalizada
            if (find && replace) {
                htmlClonado = htmlClonado.split(find).join(replace);
            }

            area.value = htmlClonado;
            area.style.display = "block";
            btn.style.display = "block";
            status.innerHTML = "✅ SUCESSO! Script de " + new URL(url).hostname + " extraído!";

        } catch (err) {
            status.innerHTML = "❌ ERRO: O site bloqueou o robô ou o link é inválido.";
        }
    }

    function copiarCodigo() {
        const copyText = document.getElementById("resultCode");
        copyText.select();
        document.execCommand("copy");
        alert("✅ SCRIPT COPIADO! Agora é só colar no seu arquivo .html");
    }
</script>

</body>
</html>
