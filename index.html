<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREHEX OMNI-CLONER v10</title>
    <style>
        body { background: #080808; color: #a020f0; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: #111; border: 2px solid #a020f0; padding: 25px; border-radius: 15px; width: 100%; max-width: 650px; box-shadow: 0 0 40px rgba(160, 32, 240, 0.5); text-align: center; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #444; color: #0f0; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #a020f0; color: #fff; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 14px; text-transform: uppercase; transition: 0.4s; }
        button:hover { background: #fff; color: #a020f0; box-shadow: 0 0 25px #fff; }
        .btn-copy { background: #00ff88 !important; color: #000 !important; display: none; margin-top: 15px; }
        textarea { width: 100%; height: 350px; margin-top: 20px; background: #000; color: #0f0; border: 1px solid #a020f0; padding: 10px; font-size: 11px; display: none; border-radius: 5px; }
        #status { margin-top: 15px; font-size: 13px; color: #fff; text-shadow: 0 0 5px #a020f0; }
    </style>
</head>
<body>

<div class="panel">
    <h1>ꜰɪʀᴇʜᴇx ᴏᴍɴɪ-ᴄʟᴏɴᴇʀ</h1>
    <input type="text" id="targetUrl" placeholder="Link de qualquer site (ex: .com, .app, .online)">
    <button onclick="clonarFull()">EXTRAIR SCRIPT TOTAL</button>
    <button id="btnCopiar" class="btn-copy" onclick="copiar()">📋 COPIAR SCRIPT</button>
    <div id="status">Aguardando comando...</div>
    <textarea id="result" readonly></textarea>
</div>

<script>
    async function clonarFull() {
        let url = document.getElementById('targetUrl').value.trim();
        const status = document.getElementById('status');
        const area = document.getElementById('result');
        const btn = document.getElementById('btnCopiar');

        if (!url) return alert("Insira o link!");
        if (!url.startsWith('http')) url = 'https://' + url;

        status.innerHTML = "🌀 [FIREHEX] Quebrando firewalls e mapeando diretórios...";
        area.style.display = "none";
        btn.style.display = "none";

        try {
            // Proxy Ultra que simula um navegador real (User-Agent)
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()}`);
            const data = await response.json();
            let html = data.contents;

            if (!html) throw new Error();

            const base = new URL(url).origin;

            // --- RECONSTRUÇÃO DE LINKS (O segredo para não dar tela preta) ---
            // 1. Injeta base absoluta
            let code = html.replace('<head>', `<head><base href="${base}/">`);
            
            // 2. Corrige links de scripts, css e imagens que começam com / ou //
            code = code.replace(/src="\//g, `src="${base}/`);
            code = code.replace(/href="\//g, `href="${base}/`);
            code = code.replace(/url\('\//g, `url('${base}/`);
            
            // 3. Injeta o Bypass de erros (limpa avisos de Webhook ou APIs bloqueadas)
            let cleanup = \`
            <script>
                // Impede que o site trave se não achar as funções originais
                window.onerror = () => true;
                setInterval(() => {
                    document.querySelectorAll('div, p, span').forEach(el => {
                        if(el.innerText.includes('WEBHOOK') || el.innerText.includes('Error')) el.style.display = 'none';
                    });
                }, 1000);
            <\/script>\`;
            
            code = code.replace('</body>', cleanup + '</body>');

            area.value = code;
            area.style.display = "block";
            btn.style.display = "block";
            status.innerHTML = "✅ SUCESSO! Clone de " + new URL(url).hostname + " pronto.";

        } catch (e) {
            status.innerHTML = "❌ BLOQUEIO: O site alvo exige um robô com VPS.";
        }
    }

    function copiar() {
        const area = document.getElementById('result');
        area.select();
        document.execCommand("copy");
        alert("✅ Script copiado para o seu celular!");
    }
</script>
</body>
</html>
