<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREHEX OMNI-INJECTOR v4</title>
    <style>
        body { background: #000; color: #a020f0; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: #111; border: 2px solid #a020f0; padding: 25px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 0 30px rgba(160, 32, 240, 0.3); }
        h1 { font-size: 20px; text-align: center; color: #fff; text-shadow: 0 0 10px #a020f0; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #0f0; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #a020f0; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        button:hover { background: #fff; color: #a020f0; box-shadow: 0 0 20px #fff; }
        textarea { width: 100%; height: 350px; margin-top: 20px; background: #050505; color: #0f0; border: 1px solid #a020f0; padding: 10px; font-size: 11px; display: none; }
        #log { margin-top: 10px; font-size: 12px; color: #fff; text-align: center; }
    </style>
</head>
<body>

<div class="panel">
    <h1>ꜰɪʀᴇʜᴇx ᴏᴍɴɪ-ᴇxᴛʀᴀᴄᴛᴏʀ</h1>
    <input type="text" id="url" placeholder="Link do site (qualquer domínio)">
    <input type="text" id="find" placeholder="Texto para remover">
    <input type="text" id="replace" placeholder="Texto para colocar">
    <button onclick="extrair()">EXECUTAR EXTRAÇÃO TOTAL</button>
    <div id="log"></div>
    <textarea id="output" readonly></textarea>
</div>

<script>
    async function extrair() {
        let target = document.getElementById('url').value;
        const findText = document.getElementById('find').value;
        const replaceText = document.getElementById('replace').value;
        const log = document.getElementById('log');
        const output = document.getElementById('output');

        if(!target) return alert("Insira o link!");
        if(!target.startsWith('http')) target = 'https://' + target;

        log.innerHTML = "🌀 [FIREHEX] Quebrando protocolos de segurança...";
        
        try {
            // Proxy 1 (AllOrigins) - Bom para sites comuns
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
            const data = await res.json();
            let rawHtml = data.contents;

            if(!rawHtml) throw new Error("Bloqueio detectado.");

            // PEGA O DOMÍNIO BASE (ex: https://site.app)
            const urlObj = new URL(target);
            const base = urlObj.origin;

            // O TRUQUE MESTRE: Injeta a tag <base> no topo do código
            // Isso faz com que TODOS os scripts e imagens carreguem do site original
            let baseTag = `<head><base href="${base}/">`;
            let finalCode = rawHtml.replace('<head>', baseTag);

            // Troca os termos escolhidos
            finalCode = finalCode.split(findText).join(replaceText);

            output.value = finalCode;
            output.style.display = "block";
            log.innerHTML = "✅ SCRIPT EXTRAÍDO COM SUCESSO!";
            alert("Sucesso! O código está pronto para uso.");

        } catch (e) {
            log.innerHTML = "❌ Erro. O site alvo possui firewall avançado.";
        }
    }
</script>

</body>
</html>
