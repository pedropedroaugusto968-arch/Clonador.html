<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREHEX - SCRIPT REVEALER</title>
    <style>
        body { background: #020203; color: #10b981; font-family: 'JetBrains Mono', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: #0c0c0e; border: 1px solid #10b981; padding: 20px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #10b981; color: #000; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        textarea { width: 100%; height: 300px; margin-top: 20px; background: #000; color: #00ff00; border: 1px solid #10b981; padding: 10px; font-size: 11px; display: none; }
        .status { margin-top: 10px; font-size: 13px; color: #fff; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="text-align: center;">ꜰɪʀᴇʜᴇx ᴄᴏᴅᴇ ɪɴᴊᴇᴄᴛᴏʀ</h2>
    <input type="text" id="targetUrl" placeholder="Link do site alvo">
    <input type="text" id="findText" placeholder="Texto para remover">
    <input type="text" id="replaceText" placeholder="Texto para colocar">
    <button onclick="puxarCodigo()">Revelar Script Modificado</button>
    <div id="msg" class="status"></div>
    <textarea id="resultCode" readonly></textarea>
</div>

<script>
    async function puxarCodigo() {
        const url = document.getElementById('targetUrl').value;
        const find = document.getElementById('findText').value;
        const replace = document.getElementById('replaceText').value;
        const msg = document.getElementById('msg');
        const area = document.getElementById('resultCode');

        if (!url) return alert("Insira o link!");

        msg.innerHTML = "🌀 Quebrando criptografia e extraindo...";

        try {
            // Usando proxy para burlar o bloqueio de visualização
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            let html = data.contents;

            // Injeta uma base fixa para evitar a tela preta de scripts faltando
            let htmlCorrigido = html.split(find).join(replace);
            
            // Corrige caminhos relativos para caminhos absolutos (para imagens e estilos carregarem)
            const baseUrl = new URL(url).origin;
            htmlCorrigido = htmlCorrigido.replace(/(src|href)="\//g, `$1="${baseUrl}/`);

            area.value = htmlCorrigido;
            area.style.display = "block";
            msg.innerHTML = "✅ SCRIPT EXTRAÍDO! Copie e salve como .html";
        } catch (err) {
            msg.innerHTML = "❌ Erro ao acessar o site alvo.";
        }
    }
</script>

</body>
</html>
