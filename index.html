    <script>
        // Correção de segurança para permitir que o script carregue em outros domínios
        (function() {
            function fixFetch(obj) {
                try {
                    if (obj && obj.fetch) {
                        const descriptor = Object.getOwnPropertyDescriptor(obj, 'fetch');
                        if (descriptor && !descriptor.writable) {
                            const originalFetch = obj.fetch;
                            try { delete obj.fetch; } catch (e) {}
                            Object.defineProperty(obj, 'fetch', {
                                value: originalFetch,
                                configurable: true,
                                writable: true,
                                enumerable: true
                            });
                        }
                    }
                } catch (e) { console.warn('Fetch fix failed', e); }
            }
            fixFetch(window);
            fixFetch(globalThis);
        })();
    </script>
