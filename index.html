<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREHEX CLONER VIP</title>
    <style>
        body { background-color: #0d0d0d; color: #a020f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #a020f0; box-shadow: 0 0 20px #a020f0; width: 90%; max-width: 500px; }
        h1 { text-shadow: 2px 2px #000; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #a020f0; background: #000; color: #00ff00; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #a020f0; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #7b1fa2; box-shadow: 0 0 15px #fff; }
        #status { margin-top: 20px; font-size: 14px; word-break: break-all; color: #00ff00; }
        .loading { color: yellow; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>ꜰɪʀᴇʜᴇx ᴄʟᴏɴᴇʀ ᴠ3</h1>
    
    <input type="text" id="urlAlvo" placeholder="Link do site (ex: https://site.com)">
    <input type="text" id="termoAntigo" placeholder="Texto para trocar (ex: R$ 100)">
    <input type="text" id="termoNovo" placeholder="Novo texto (ex: R$ 0,00)">
    
    <button onclick="iniciarClonagem()">INVASÃO E CLONAGEM</button>

    <div id="status"></div>
</div>

<script>
    // --- CONFIGURAÇÃO DA API ---
    const GITHUB_TOKEN = "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"; 
    const GITHUB_USER = "SEU_USUARIO_AQUI"; // <-- COLOQUE SEU NOME DE USUARIO DO GITHUB AQUI

    async function iniciarClonagem() {
        const url = document.getElementById('urlAlvo').value;
        const antigo = document.getElementById('termoAntigo').value;
        const novo = document.getElementById('termoNovo').value;
        const status = document.getElementById('status');

        if(!url || !antigo || !novo) {
            alert("Preencha todos os campos!");
            return;
        }

        status.innerHTML = "<span class='loading'>🌀 Invadindo scripts do site alvo...</span>";

        try {
            // 1. Puxando o código via Proxy
            const proxy = "https://api.allorigins.win/get?url=";
            const res = await fetch(proxy + encodeURIComponent(url));
            const data = await res.json();
            let html = data.contents;

            // 2. Modificando o conteúdo
            status.innerHTML = "<span class='loading'>🛠️ Modificando dados e injetando FireHex...</span>";
            let htmlFinal = html.split(antigo).join(novo);

            // 3. Criando Repo e Link no GitHub
            const repoName = "fh-clone-" + Math.floor(Math.random() * 10000);
            
            // Criar Repo
            await fetch(`https://api.github.com/user/repos`, {
                method: 'POST',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: repoName, auto_init: true })
            });

            // Subir Arquivo
            await fetch(`https://api.github.com/repos/${GITHUB_USER}/${repoName}/contents/index.html`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Site dominado pela FireHex",
                    content: btoa(unescape(encodeURIComponent(htmlFinal)))
                })
            });

            status.innerHTML = `✅ SUCESSO!<br>O site foi clonado e modificado.<br><br>LINK: <a href="https://${GITHUB_USER}.github.io/${repoName}/" target="_blank" style="color:white;">https://${GITHUB_USER}.github.io/${repoName}/</a>`;

        } catch (e) {
            status.innerHTML = "❌ ERRO: Verifique seu Token ou o nome de usuário.";
        }
    }
</script>

</body>
</html>
